<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản lý xưởng</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app"></div>
  <script>
    setTimeout(function () {
      var app = document.getElementById('app');
      if (app && !app.innerHTML.trim()) {
        app.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#eef3f8;padding:24px;font-family:Arial,sans-serif;"><div style="max-width:560px;background:white;border:1px solid #fecaca;border-radius:8px;padding:24px;box-shadow:0 16px 40px rgba(15,23,42,.14);"><h1 style="margin:0 0 10px;color:#b91c1c;font-size:22px;">Không tải được ứng dụng</h1><p style="margin:0;color:#374151;">Trình duyệt không nạp được JavaScript module. Hãy mở DevTools Console để xem lỗi, hoặc chạy bằng server local từ đúng thư mục dự án.</p></div></div>';
      }
    }, 4000);
  </script>
  <script type="module" src="./source/app.js"></script>
</body>
</html>
